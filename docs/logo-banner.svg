<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <!--
    Wide README banner: same TLDR / free block on the left, tagline on the right.
    Text widths still aligned via textLength so the two lines read as a unit.
  -->
  <rect width="600" height="200" rx="14" ry="14" fill="#1a73e8"/>

  <text x="40" y="100"
        text-anchor="start"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="900"
        font-size="80"
        fill="#ffffff"
        textLength="180"
        lengthAdjust="spacingAndGlyphs">TLDR</text>
  <text x="40" y="148"
        text-anchor="start"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="600"
        font-size="38"
        fill="#ffffff"
        opacity="0.92"
        textLength="180"
        lengthAdjust="spacingAndGlyphs">free</text>

  <line x1="260" y1="50" x2="260" y2="150" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>

  <text x="290" y="92"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="600"
        font-size="22"
        fill="#ffffff">Local summaries &amp; Q&amp;A</text>
  <text x="290" y="120"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="400"
        font-size="18"
        fill="#ffffff" opacity="0.85">for web pages and YouTube videos.</text>
  <text x="290" y="150"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="400"
        font-size="14"
        fill="#ffffff" opacity="0.7">Open source. No keys. Nothing leaves your machine.</text>
</svg>
