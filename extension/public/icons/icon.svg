<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!--
    TLDR Free — square icon.
    Layout idea (from the user): "TLDR" big on top, "free" smaller below,
    both lines forced to the same width via textLength + lengthAdjust so the
    two-line block reads as one balanced rectangle.
  -->
  <rect width="128" height="128" rx="22" ry="22" fill="#1a73e8"/>
  <text x="64" y="68"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="900"
        font-size="44"
        fill="#ffffff"
        textLength="96"
        lengthAdjust="spacingAndGlyphs">TLDR</text>
  <text x="64" y="100"
        text-anchor="middle"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-weight="600"
        font-size="22"
        fill="#ffffff"
        opacity="0.92"
        textLength="96"
        lengthAdjust="spacingAndGlyphs">free</text>
</svg>
